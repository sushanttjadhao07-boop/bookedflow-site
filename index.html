<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booked Flow</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Manrope',sans-serif;
  background:#010408;
  color:#cdd7e8;
  overflow-x:hidden;
}

/* ===== CONTAINER ===== */
.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* ===== NAV ===== */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.logo{
  font-weight:800;
  font-size:20px;
  color:#00d4ff;
}

.nav-cta{
  padding:8px 16px;
  border:1px solid #00d4ff;
  text-decoration:none;
  color:#00d4ff;
  font-size:12px;
}

/* ===== HERO ===== */
.hero{
  display:grid;
  grid-template-columns:1fr;
  gap:40px;
  padding:40px 0;
}

.hero h1{
  font-size:clamp(32px,8vw,72px);
  line-height:1;
}

.hero p{
  margin-top:16px;
  color:#4a6080;
  font-size:14px;
  line-height:1.6;
}

.btns{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:12px 20px;
  border:none;
  cursor:pointer;
}

.primary{
  background:#00d4ff;
  color:#000;
}

.ghost{
  background:transparent;
  border:1px solid #333;
  color:#fff;
}

/* ===== MOCK CARD ===== */
.mock{
  background:#0e1d2e;
  padding:20px;
  border-radius:12px;
}

/* ===== STATS ===== */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin:40px 0;
}

.stat{
  text-align:center;
  padding:20px;
  border:1px solid #1a2a40;
}

.stat h2{
  font-size:32px;
  color:#00d4ff;
}

/* ===== VIDEO ===== */
.video{
  width:100%;
  aspect-ratio:16/9;
  margin-top:30px;
}

.video iframe{
  width:100%;
  height:100%;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  gap:20px;
}

.card{
  background:#0e1d2e;
  padding:20px;
  border-radius:10px;
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:30px 0;
  font-size:12px;
  color:#4a6080;
}

/* ===== DESKTOP ===== */
@media(min-width:768px){

.hero{
  grid-template-columns:1fr 1fr;
  align-items:center;
}

.stats{
  grid-template-columns:repeat(4,1fr);
}

.grid{
  grid-template-columns:repeat(3,1fr);
}

}

</style>
</head>

<body>

<div class="wrap">

<!-- NAV -->
<nav>
  <div class="logo">BookedFlow</div>
  <a href="#" class="nav-cta">Book Demo</a>
</nav>

<!-- HERO -->
<div class="hero">

  <div>
    <h1>
      Losing<br>
      <span style="color:#00d4ff">$5K–$20K</span><br>
      Every Month
    </h1>

    <p>
      Missed calls = lost jobs. This system captures and books them automatically.
    </p>

    <div class="btns">
      <button class="primary">Watch Demo</button>
      <button class="ghost">Calculate Loss</button>
    </div>
  </div>

  <div class="mock">
    <p>📵 Missed Call</p>
    <p>📵 Missed Call</p>
    <p>✅ Booked Job</p>
  </div>

</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><h2>87%</h2><p>Lost Calls</p></div>
  <div class="stat"><h2>3×</h2><p>Faster</p></div>
  <div class="stat"><h2>$14K</h2><p>Recovered</p></div>
  <div class="stat"><h2>24/7</h2><p>Automation</p></div>
</div>

<!-- VIDEO -->
<div class="video">
  <iframe src="https://www.youtube.com/embed/UTBsPwXg3l0" allowfullscreen></iframe>
</div>

<!-- GRID -->
<div class="grid" style="margin-top:40px;">
  <div class="card">Problem 1</div>
  <div class="card">Problem 2</div>
  <div class="card">Problem 3</div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Booked Flow
</footer>

</div>

</body>
</html>
